<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2f</title>
</head>
<body>
  <div class="js-container"></div>
  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
  <script src="https://unpkg.com/supersimpledev/babel.js"></script> 

  <script type="text/babel">

    function ProductDetails({productName, price, discountPrice}) {
      return (
        <>
        <div>
          <p>{productName}</p>
          {!discountPrice && <p>Price: ${price}</p>}
          { discountPrice && 
            <>
            <del><p>Price: ${price}</p></del>
            <p>Discount price: ${discountPrice}</p> 
            </>
          }
          <button>Add to Cart</button>
        </div>
        </>
      );
    }

    function App(){
      return(
        <>
          <ProductDetails productName="Cotton Socks" price="10.90" discountPrice="5.45" />
          <ProductDetails productName="Tennis balls" price="6.00" />
          <ProductDetails productName="Plain T-Shirt" price ="7.99"/>
        </>
      );
    }

    const container = document.querySelector('.js-container');
    ReactDOM.createRoot(container).render(<App />)
  </script>



  
</body>
</html>
