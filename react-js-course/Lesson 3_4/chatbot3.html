<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot 2</title>
  </head>
  <body>
    <div class="js-container"></div>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script> 

    <script type="text/babel">

      function ChatInput(){

        //event: is an object and it contains details about the event or about the change. 

        //event.target gives us the element that we are typing in or that we changed in. In this case, its gonna give us the input element. So here it gives us the access of the input 

        const [inputText, setInputText] = React.useState('');

        function saveInputText(event){
          setInputText(event.target.value);
        }

        function sendMessage() {
          setChatMessages([
            ...chatMessages,
            {
              message:'test',
              sender:'user',
              id: crypto.randomUUID()
            }
          ]);
        }

        return(
          <>
            <input 
              placeholder="Send a message to Chatbot" 
              size="30"
              onChange={saveInputText}
            />
            <button onClick={sendMessage}>Send</button>
          </>
        );
      }

      function ChatMessage({message, sender}) {
    

        return  (
          <div>
            {sender === 'robot' && (
              <img src="robot.png" width="50" />
            )}
            {message}
            {sender === 'user' &&  (
              <img src="user.png" width="50" />
            )}
          </div>
        );
      }

      function ChatMessages() {
        const [chatMessages, setChatMessages] = React.useState(
          [{
          message: 'hello Chatbot',
          sender: 'user',
          id: 'id1'
        }, {
          message: 'Hello! How can i help you',
          sender: 'robot',
          id:'id2'
        }, {
          message: 'Can you get me today\'s date?',
          sender: 'user',
          id: 'id3'
        }, {
          message: 'Today is June 27',
          sender: 'robot',
          id: 'id4'
        }]);

        //const [chatMessages, setChatMessages] = array;  //taking first value out of the array and also second value out of the array. This line is shortcut for next two lines. This shortcut is called array destructuring, because we are taking stuff out of the array. In array destructuring order matters. 

        //const chatMessages = array[0]; //1) first value is the current data
      
        //const setChatMessages = array[1];   //2nd value is the function that updates the data. Also known as updater function.



      

      

        return (
          <>
        
          
            {chatMessages.map((chatMessage) => {
                  return (
                    <ChatMessage 
                    message={chatMessage.message}
                    sender={chatMessage.sender}
                    key={chatMessage.id}
                    />
                  );
              })}
          </>
        )
        
      }

      function App(){
        
        //.map():lets us to go through each value of an array and convert it into a new value. 

        return (
            <>
            <ChatInput />
            <ChatMessages/>
            </>
        );
      }
    
      const container = document.querySelector('.js-container');  
      ReactDOM.createRoot(container).render(<App />);

    </script>
  </body>
</html>

<!--
State: data that is connected to the HTML.
When we update this data, it will update the HTML.
To convert some data in state we use React.useState(), so here it will convert the array of object messages into state.

Usestate gives us two values
1) The current data
2) Updater function, to update the data. If we use Updater function it also updates the html data. 


Array Destructuring: it means taking values out of the array. 

In react we should use state to save the data that changes over time. 
-->
