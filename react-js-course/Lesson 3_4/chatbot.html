<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script> 

    <script type="text/babel">

      function ChatInput(){
        return(
          <>
            <input 
              placeholder="Send a message to Chatbot" 
              size="30"
            />
            <button>Send</button>
          </>
        );
      }

      function ChatMessage({message, sender}) {
    

        return  (
          <div>
            {sender === 'robot' && (
              <img src="robot.png" width="50" />
            )}
            {message}
            {sender === 'user' &&  (
              <img src="user.png" width="50" />
            )}
          </div>
        );
      }

      function ChatMessages() {
        const array = React.useState(
          [{
          message: 'hello Chatbot',
          sender: 'user',
          id: 'id1'
        }, {
          message: 'Hello! How can i help you',
          sender: 'robot',
          id:'id2'
        }, {
          message: 'Can you get me today\'s date?',
          sender: 'user',
          id: 'id3'
        }, {
          message: 'Today is June 27',
          sender: 'robot',
          id: 'id4'
        }]);

        const chatMessages = array[0]; //1) first value is the current data
      
        const setChatMessages = array[1];   //2nd value is the function that updates the data. Also known as updater function.



        function sendMessage(){
          chatMessages.push({  //.push adds value at the end of the array.
            message: 'test',
            sender:'user',
            id: crypto.randomUUID()  //generates unique id everytimes this function runs
          });

          console.log(chatMessages);
        }

      

        return (
          <>
          <button onClick={sendMessage}>Send Message</button>
          
            {chatMessages.map((chatMessage) => {
                  return (
                    <ChatMessage 
                    message={chatMessage.message}
                    sender={chatMessage.sender}
                    key={chatMessage.id}
                    />
                  );
              })}
          </>
        )
        
      }

      function App(){
        
        //.map():lets us to go through each value of an array and convert it into a new value. 

        return (
            <>
            <ChatInput />
            <ChatMessages/>
            </>
        );
      }
    
      const container = document.querySelector('.js-container');  
      ReactDOM.createRoot(container).render(<App />);

    </script>
  </body>
</html>
