<!--Lifting the components up in the state means moving a state from child component to parent component. So that other child component can also access that state. Once the state is moved to the parent compoent, the parent component can share it across its child using props.  -->

<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot 5</title>
  </head>
  <body>
    <div class="js-container"></div>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script> 
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script type="text/babel">

      function ChatInput({chatMessages, setChatMessages}){
        const [inputText, setInputText] = React.useState('');

        function saveInputText(event){
          setInputText(event.target.value);
        }

        function sendMessage() {
          const newChatMessages = [
            ...chatMessages,
            {
              message: inputText,
              sender:'user',
              id: crypto.randomUUID()
            }
          ]

          setChatMessages(newChatMessages);

          const response = Chatbot.getResponse(inputText);
            setChatMessages([
            ...newChatMessages,
            {
              message: response,
              sender:'robot',
              id: crypto.randomUUID()
            }
          ]);

          setInputText(''); //this will update the inputText to empty after sending the message, but it will not update the html yet, under the return statement, we have to give a prop to the input box known as value. This is called controlled input, and using the value prop we can controlled the text inside the textbox using our code. 
        }

        return(
          <>
            <input 
              placeholder="Send a message to Chatbot" 
              size="30"
              onChange={saveInputText}
              value={inputText}
            />
            <button onClick={sendMessage}>Send</button>
          </>
        );
      }

      function ChatMessage({message, sender}) {
    

        return  (
          <div>
            {sender === 'robot' && (
              <img src="robot.png" width="50" />
            )}
            {message}
            {sender === 'user' &&  (
              <img src="user.png" width="50" />
            )}
          </div>
        );
      }

      function ChatMessages({chatMessages}) {
        return (
          <>
        
          
            {chatMessages.map((chatMessage) => {
                  return (
                    <ChatMessage 
                    message={chatMessage.message}
                    sender={chatMessage.sender}
                    key={chatMessage.id}
                    />
                  );
              })}
          </>
        )
        
      }

      function App(){

        const [chatMessages, setChatMessages] = React.useState(
          [{
          message: 'hello Chatbot',
          sender: 'user',
          id: 'id1'
        }, {
          message: 'Hello! How can i help you',
          sender: 'robot',
          id:'id2'
        }, {
          message: 'Can you get me today\'s date?',
          sender: 'user',
          id: 'id3'
        }, {
          message: 'Today is June 27',
          sender: 'robot',
          id: 'id4'
        }]);
        

        return (
            <>
            <ChatInput 
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}
            />
            <ChatMessages
            chatMessages = {chatMessages}
            />
            </>
        );
      }
    
      const container = document.querySelector('.js-container');  
      ReactDOM.createRoot(container).render(<App />);

    </script>
  </body>
</html>
